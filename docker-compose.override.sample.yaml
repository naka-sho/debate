# GPU対応の docker-compose オーバーライドサンプル
#
# 使い方:
#   cp docker-compose.override.sample.yaml docker-compose.override.yaml
#   docker compose up -d
#
# NVIDIA GPU が利用可能な環境で Ollama の推論を GPU で実行します。
# nvidia-container-toolkit が必要です:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  ollama-qwen:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-llama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
